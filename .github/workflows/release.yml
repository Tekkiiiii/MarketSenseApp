name: Release — macOS .dmg + Windows .exe

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: ThuongMinh

jobs:
  # ─── macOS — builds .dmg for Apple Silicon + Intel ────────────────────────
  build-macos:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Patch create-dmg for headless CI
        run: |
          # In CI there is no Finder/AppleScript — skip the cosmetic AppleScript step
          find "$(brew --prefix)/bin" -name "create-dmg" 2>/dev/null | head -1 | xargs -I{} \
            grep -q "SKIP_JENKINS" {} || true
          # The generated bundle_dmg.sh calls create-dmg without --skip-jenkins.
          # Patch the generated script in-place before the Tauri bundler runs.
          DMG_SCRIPT="src-tauri/target/release/bundle/dmg/bundle_dmg.sh"
          if [[ -f "$DMG_SCRIPT" ]]; then
            sed -i '' 's/create-dmg /create-dmg --skip-jenkins /g' "$DMG_SCRIPT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (macOS ${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `ThuongMinh_*.aarch64.dmg` |
            | macOS (Intel) | `ThuongMinh_*.x86_64.dmg` |
            | Windows | `ThuongMinh_*.exe` |

            ## What's New

            See [CHANGELOG.md](https://github.com/Tekkiiiii/MarketSenseApp/blob/main/CHANGELOG.md) for full release notes.
          releaseDraft: true
          prerelease: false
          artifactsMatch: |
            **/*.dmg
            **/*.exe

  # ─── Windows — builds NSIS .exe installer ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Windows NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `ThuongMinh_*.aarch64.dmg` |
            | macOS (Intel) | `ThuongMinh_*.x86_64.dmg` |
            | Windows | `ThuongMinh_*.exe` |

            ## What's New

            See [CHANGELOG.md](https://github.com/Tekkiiiii/MarketSenseApp/blob/main/CHANGELOG.md) for full release notes.
          releaseDraft: true
          prerelease: false
          artifactsMatch: |
            **/*.dmg
            **/*.exe
