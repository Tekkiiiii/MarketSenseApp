name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          PROJECT="thuongminh-landing"
          DIR="landing"

          echo "=== Verifying project ==="
          PROJECT_JSON=$(curl -s -X GET \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT")
          if ! echo "$PROJECT_JSON" | grep -q '"success":true'; then
            echo "ERROR: Project not found or API error:"
            echo "$PROJECT_JSON"
            exit 1
          fi
          echo "Project verified: $PROJECT"

          echo "=== Creating deployment ==="
          DEPLOYMENT_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"main\",\"project_name\":\"$PROJECT\"}" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/deployments")

          if ! echo "$DEPLOYMENT_JSON" | grep -q '"success":true'; then
            echo "ERROR: Failed to create deployment:"
            echo "$DEPLOYMENT_JSON"
            exit 1
          fi

          DEPLOYMENT_ID=$(echo "$DEPLOYMENT_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['id'])")
          UPLOAD_URL=$(echo "$DEPLOYMENT_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['upload_url'])")
          echo "Deployment created: $DEPLOYMENT_ID"

          echo "=== Uploading files ==="
          cd "$DIR"

          # Upload each file individually
          for file in $(find . -type f); do
            REL_PATH="${file:2}"  # strip leading ./
            CONTENT_TYPE="text/html"
            if [[ "$file" == *.css ]]; then CONTENT_TYPE="text/css"; fi
            if [[ "$file" == *.js ]]; then CONTENT_TYPE="application/javascript"; fi
            if [[ "$file" == *.svg ]]; then CONTENT_TYPE="image/svg+xml"; fi
            if [[ "$file" == *.png ]]; then CONTENT_TYPE="image/png"; fi

            echo "  Uploading: $REL_PATH"
            curl -s -X PUT \
              -H "Content-Type: $CONTENT_TYPE" \
              --data-binary "@$file" \
              "$UPLOAD_URL/$REL_PATH" > /dev/null
          done

          echo "=== Finalizing deployment ==="
          FINALIZE=$(curl -s -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/deployments/$DEPLOYMENT_ID/finalize")

          if echo "$FINALIZE_JSON" | grep -q '"success":true'; then
            echo "Deploy successful!"
            URL=$(echo "$FINALIZE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['url'])")
            echo "URL: $URL"
          else
            echo "ERROR: Failed to finalize:"
            echo "$FINALIZE_JSON"
            exit 1
          fi
