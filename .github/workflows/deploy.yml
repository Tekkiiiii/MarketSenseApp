name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import urllib.request
          import urllib.error

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          project = "thuongminh-landing"
          dir_path = "landing"
          auth = f"Bearer {token}"
          base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}"

          headers = {
              "Authorization": auth,
              "Content-Type": "application/json"
          }

          def api_get(path):
              req = urllib.request.Request(base + path, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def api_post(path, data=None, headers_extra=None):
              h = dict(headers)
              if headers_extra:
                  h.update(headers_extra)
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(base + path, data=body, headers=h, method="POST")
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def api_put(url, data, content_type):
              h = {"Authorization": auth, "Content-Type": content_type}
              req = urllib.request.Request(url, data=data, headers=h, method="PUT")
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # Step 1: verify project
          print("=== Verifying project ===")
          proj = api_get(f"/pages/projects/{project}")
          if not proj.get("success"):
              print(f"ERROR: {proj}")
              raise SystemExit(1)
          print(f"Project verified: {proj['result']['name']}")

          # Step 2: create deployment
          print("=== Creating deployment ===")
          deploy = api_post(f"/pages/projects/{project}/deployments", {"branch": "main"})
          if not deploy.get("success"):
              print(f"ERROR creating deployment: {deploy}")
              raise SystemExit(1)

          dep_id = deploy["result"]["id"]
          upload_url = deploy["result"]["upload_url"]
          print(f"Deployment created: {dep_id}")

          # Step 3: upload files
          print("=== Uploading files ===")
          import glob, mimetypes
          os.chdir(dir_path)
          for filepath in glob.glob("**/*", recursive=True):
              if not os.path.isfile(filepath):
                  continue
              mt = mimetypes.guess_type(filepath)[0] or "application/octet-stream"
              rel_path = filepath.lstrip("/")
              print(f"  Uploading: {rel_path}")
              with open(filepath, "rb") as f:
                  data = f.read()
              api_put(f"{upload_url}/{rel_path}", data, mt)

          # Step 4: finalize
          print("=== Finalizing ===")
          finalize = api_post(f"/pages/projects/{project}/deployments/{dep_id}/finalize")
          if not finalize.get("success"):
              print(f"ERROR finalizing: {finalize}")
              raise SystemExit(1)
          print(f"Deploy successful! URL: {finalize['result']['url']}")
          PYEOF
